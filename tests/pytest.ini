[pytest]
asyncio_mode = auto
testpaths = layer1_core layer2_power layer3_remote layer4_a7 layer5_vehicle layer6_faults
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = false
log_cli_level = INFO
markers =
    requires_vehicle: requires a physical EV plugged in
    live_charger: requires BORNE-CABANON4 or GRIZZLE-001 online
    sim_only: uses VIRTUAL-001 only (safe)
    slow: takes > 30s
filterwarnings =
    ignore::DeprecationWarning
